<svg xmlns="http://www.w3.org/2000/svg" width="850" height="210" viewBox="0 0 850 210" role="img" aria-labelledby="title desc">
  <title id="title">Utkarsh Dubey terminal banner</title>
  <desc id="desc">Animated terminal introducing Utkarsh as a software developer, AI builder, and product engineer.</desc>
  <defs>
    <linearGradient id="border" x1="0" x2="1">
      <stop offset="0" stop-color="#58a6ff" />
      <stop offset="0.5" stop-color="#a371f7" />
      <stop offset="1" stop-color="#3fb950" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0 3.5H4" stroke="#ffffff" stroke-opacity=".025" />
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .reveal1 { animation: reveal 8s infinite; }
      .reveal2 { animation: reveal 8s 1.1s infinite both; }
      .reveal3 { animation: reveal 8s 2.2s infinite both; }
      .cursor { animation: blink 1s steps(1) infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes reveal { 0%,8% { opacity:0; transform:translateY(5px) } 15%,88% { opacity:1; transform:none } 96%,100% { opacity:0 } }
      @keyframes blink { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
      @keyframes pulse { 0%,100% { opacity:.55 } 50% { opacity:1 } }
    </style>
  </defs>

  <rect x="2" y="2" width="846" height="206" rx="14" fill="#0d1117" stroke="url(#border)" stroke-width="2" />
  <rect x="3" y="3" width="844" height="204" rx="13" fill="url(#scanlines)" />
  <path d="M3 40H847" stroke="#30363d" />
  <circle cx="23" cy="21" r="5" fill="#ff5f56" />
  <circle cx="42" cy="21" r="5" fill="#ffbd2e" />
  <circle cx="61" cy="21" r="5" fill="#27c93f" />
  <text x="425" y="26" fill="#8b949e" font-size="12" text-anchor="middle" class="mono">utkarsh@nsut — profile</text>

  <g class="mono" font-size="16">
    <g class="reveal1">
      <text x="28" y="70" fill="#3fb950">➜</text>
      <text x="53" y="70" fill="#c9d1d9">whoami</text>
      <text x="53" y="96" fill="#58a6ff" font-size="22" font-weight="700" filter="url(#glow)">UTKARSH DUBEY</text>
    </g>
    <g class="reveal2">
      <text x="28" y="126" fill="#3fb950">➜</text>
      <text x="53" y="126" fill="#c9d1d9">cat roles.txt</text>
      <text x="53" y="151" fill="#d2a8ff">&lt;software_developer /&gt;  &lt;ai_builder /&gt;  &lt;product_engineer /&gt;</text>
    </g>
    <g class="reveal3">
      <text x="28" y="181" fill="#3fb950">➜</text>
      <text x="53" y="181" fill="#f0f6fc">BUILD · LEARN · CAPTURE</text>
      <rect x="281" y="167" width="9" height="18" rx="1" fill="#58a6ff" class="cursor pulse" />
    </g>
  </g>
</svg>
